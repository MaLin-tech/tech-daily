name: Daily Tech News Update

on:
  schedule:
    # 8:00 AM Beijing time (UTC 0:00)
    - cron: '0 0 * * *'
  workflow_dispatch:  # 支持手动触发

# Set GITHUB_TOKEN permissions for push
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run fetch script
        run: node scripts/fetch-articles.js

      - name: Commit and push changes
        run: |
          git config user.name "Tech Daily Bot"
          git config user.email "tech-daily-bot@users.noreply.github.com"
          git add articles.json
          git diff --quiet && git diff --staged --quiet || git commit -m "📰 Daily update $(date +'%Y-%m-%d')"
          git push